server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://orders-db:5432/orders_db
    username: orders_user
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      # Reliability: wait for all in-sync replicas to ack, and retry transient failures.
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Jackson 3 serializer (Boot 4 default). Replaces the deprecated JsonSerializer.
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

kafka:
  topics:
    order-placed: order.placed
